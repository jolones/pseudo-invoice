<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Bosshard Medical{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-gray-900 text-lg">Bosshard Medical</a>
      <div class="flex items-center gap-4 text-sm text-gray-600">
        {% if user is defined and user %}
          <span>{{ user.name }}</span>
          <form action="/logout" method="post" class="inline">
            <button type="submit" class="text-gray-500 hover:text-gray-800 underline">Sign out</button>
          </form>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
